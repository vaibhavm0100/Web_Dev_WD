            Development and Research</title>

    <style>
    body{
            background-color: blanchedalmond;

<body>
    <header>
        <div>
            <fieldset>
                <marquee scrollamount="10" style="color: brown;">Admissions are
                    open in 2026 • Admissions are open in 2026 • Admissions are
                    open in 2026 • Admissions are open in 2026</marquee><br>
            </fieldset>
            <br>
        </div>

    </header>
    <main>
        <fieldset>
                <center>
                    <img src="newlogo.jpeg" alt="K.P.Mangalvedhekar Institute"
                        height="125" width="125" style="border-radius:50%;">

                      <h3>
                      <mark>Prin.K.P.Mangalvedhekar Institute of Management Career Development and Research</mark>
                      </h3>
                      </center>
        </fieldset><br>
        
        <!-- Payment Form -->
        <fieldset>

            <legend>
                <b>Payment Form</b>
            </legend>

            <form>

                <label for="name">
                    <b>Name :</b>
                </label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter Name"
                    required>

                <br><br>

                <label for="amount">
                    <b>Amount :</b>
                </label>
                <input
                    type="number"
                    id="amount"
                    placeholder="Enter Amount"
                    required>

                <br><br>

                <label for="payment">
                    <b>Payment Method :</b>
                </label>
                <select id="payment" required>
                    <option value="">Select Payment Method</option>
                    <option>Credit Card</option>
                    <option>Debit Card</option>
                    <option>UPI</option>
                    <option>Net Banking</option>
                </select>

                <br><br>

                <label for="card">
                    <b>Card / UPI Number :</b>
                </label>
                <input
                    type="text"
                    id="card"
                    placeholder="Enter Card or UPI Number"
                    required>

                <br><br>

                <button type="submit">
                    <a href="first6_project.html">Pay Now</a>
                </button>

            </form>

        </fieldset>

    </main>
